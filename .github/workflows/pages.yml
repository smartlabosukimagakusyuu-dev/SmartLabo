# Homepage(WEBSITE/)をGitHub Pagesへ自動デプロイする。詳細: PROJECT_BIBLE/CHANGELOG.md 2026-07-04参照
# Workflow permissionsを「読み取りおよび書き込み」に変更後の再デプロイ(2026-07-05)
name: Deploy Homepage to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "WEBSITE/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "WEBSITE"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
